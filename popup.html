<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 420px; padding: 15px; font-family: sans-serif; background: #f4f6f8; margin: 0; }
        .header-title { color: #fb7299; font-weight: bold; margin-bottom: 10px; text-align: center; font-size: 15px; }
        .token-area { background: #fff; padding: 10px; border-radius: 6px; border: 1px dashed #dcdfe6; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 5px; max-height: 80px; overflow-y: auto; }
        .token-chip { background: #fdf5f6; border: 1px solid #fbe5e9; color: #fb7299; padding: 3px 8px; border-radius: 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; user-select: none; }
        .token-chip:hover { background: #fb7299; color: #fff; }
        .search-box { display: flex; gap: 8px; margin-bottom: 8px; }
        input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid #dcdfe6; border-radius: 4px; outline: none; }
        input[type="text"]:focus { border-color: #fb7299; }
        button { padding: 8px 15px; background: #fb7299; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        button:hover { background: #ff85a8; }
        .btn-clear { background: #fff; color: #606266; border: 1px solid #dcdfe6; }
        .btn-clear:hover { background: #f4f4f5; }
        
        .setting-row { margin-bottom: 15px; font-size: 12px; color: #606266; display: flex; align-items: center; }
        .setting-row input[type="checkbox"] { margin-right: 6px; cursor: pointer; }
        .setting-row label { cursor: pointer; user-select: none; }

        #result { max-height: 400px; overflow-y: auto; }
        .bgm-details { margin-bottom: 10px; border: 1px solid #ebeef5; border-radius: 6px; background: #fff; font-size: 13px; }
        .bgm-details[open] .bgm-summary { border-bottom: 1px solid #ebeef5; background: #fafbfc; }
        .bgm-summary { padding: 10px; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .bgm-summary::-webkit-details-marker { display: none; }
        .bgm-rel-badge { color: #1989fa; background: #e6f1fc; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 8px; white-space: nowrap; }
        .bgm-score { color: #f5a623; font-weight: bold; margin-right: 8px; }
        .bgm-ep-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; color: #333; }
        .bgm-year { color: #999; font-size: 12px; margin-left: 8px; }
        
        .bgm-content { padding: 12px; }
        .bgm-section-title { font-size: 12px; font-weight: bold; color: #fb7299; margin: 12px 0 6px 0; border-bottom: 1px dashed #f0f0f0; padding-bottom: 4px;}
        .bgm-section-title:first-child { margin-top: 0; }
        .bgm-staff-row { display: flex; margin-bottom: 4px; line-height: 1.5; font-size: 12px; }
        .bgm-staff-job { color: #409eff; font-weight: bold; width: 65px; flex-shrink: 0; text-align: right; margin-right: 10px; }
        .bgm-staff-names { flex: 1; color: #555; }
        .bgm-divider { color: #eee; margin: 0 4px; }
        
        .bgm-char-item { display: inline-block; font-size: 12px; margin: 0 10px 8px 0; background: #fdf5f6; padding: 3px 8px; border-radius: 4px; border: 1px solid #fbe5e9; }
        .bgm-cv-text { color: #999; font-size: 11px; margin-left: 2px; }
        .bgm-tag { display: inline-block; background: #f4f4f5; color: #606266; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 0 6px 6px 0; border: 1px solid #e4e7ed; }
        .bgm-link { color: #303133; text-decoration: none; transition: color 0.2s;}
        .bgm-link:hover { color: #fb7299; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header-title">🌸 分词检索</div>
    
    <div style="font-size: 12px; color: #999; margin-bottom: 4px;">点击提取的词汇加入搜索框：</div>
    <div class="token-area" id="tokenArea">
        <span style="color:#ccc; font-size: 12px; padding: 2px;">读取当前网页标题中...</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="点击词语、输入或回车搜索...">
        <button class="btn-clear" id="clearBtn">清空</button>
        <button id="searchBtn">🔍 检索</button>
    </div>
    
    <div class="setting-row">
        <label>
            <input type="checkbox" id="autoExpandToggle" checked>
            切换番剧时悬浮窗自动展开（默认开启）
        </label>
    </div>
    
    <div id="result"></div>
    <script src="popup.js"></script>
</body>
</html>
